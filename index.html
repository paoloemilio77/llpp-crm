<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LLPP CRM · Battistella Golf</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root {
  --bg:#0f172a; --bg2:#1e293b; --bg3:#334155;
  --accent:#3b82f6; --accent2:#60a5fa;
  --green:#22c55e; --yellow:#f59e0b; --red:#ef4444; --orange:#f97316;
  --text:#f1f5f9; --muted:#94a3b8; --border:#334155;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* Header */
#header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 14px;
  position:sticky;top:0;z-index:500;display:flex;align-items:center;gap:8px}
#header h1{font-size:16px;font-weight:700;flex:1}
#header h1 span{color:var(--accent2)}
#gps-badge{font-size:11px;padding:3px 7px;border-radius:20px;background:var(--bg3);color:var(--muted);white-space:nowrap}
#gps-badge.ok{background:#052e16;color:var(--green)}
#gps-badge.err{background:#450a0a;color:var(--red)}
.view-toggle{display:flex;background:var(--bg3);border-radius:8px;overflow:hidden;flex-shrink:0}
.view-btn{padding:5px 10px;font-size:12px;font-weight:600;border:none;background:transparent;
  color:var(--muted);cursor:pointer;transition:all .15s}
.view-btn.active{background:var(--accent);color:white}

/* Filters */
#filters{background:var(--bg2);padding:8px 14px;display:flex;gap:7px;overflow-x:auto;
  flex-wrap:nowrap;border-bottom:1px solid var(--border);scrollbar-width:none}
#filters::-webkit-scrollbar{display:none}
.filter-btn{padding:5px 11px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg3);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:white}

/* Search */
#search-wrap{padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border)}
#search{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:7px 13px;color:var(--text);font-size:14px}
#search::placeholder{color:var(--muted)}

/* Stats */
#stats{padding:6px 14px;background:var(--bg);font-size:11px;color:var(--muted);
  border-bottom:1px solid var(--border)}

/* Geocoding banner */
#geocode-banner{background:#172554;border:1px solid #1e3a8a;border-radius:10px;
  padding:10px 14px;margin:8px 12px;font-size:12px;color:#93c5fd}
#geocode-progress{height:3px;background:var(--bg3);border-radius:2px;margin-top:6px}
#geocode-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;width:0%}

/* LIST VIEW */
#list-view{display:block}
#list{padding:8px 10px;display:flex;flex-direction:column;gap:7px}

/* Card */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:12px;cursor:pointer;transition:border-color .15s}
.card:active{opacity:.85}
.card.open-now{border-color:#166534}
.card.urgente{border-left:3px solid #dc2626}
.card.prioritario{border-left:3px solid #ea580c}
.card.has-opp{border-left:3px solid var(--accent)}
.card-top{display:flex;align-items:flex-start;gap:7px}
.card-nome{font-size:15px;font-weight:600;flex:1;line-height:1.3}
.card-prov{font-size:11px;color:var(--muted);background:var(--bg3);
  padding:2px 6px;border-radius:5px;align-self:flex-start;margin-top:2px}
.card-dist{font-size:12px;color:var(--accent2);font-weight:600;white-space:nowrap}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.badge{font-size:11px;padding:3px 7px;border-radius:8px;font-weight:500}
.badge.open{background:#052e16;color:var(--green)}
.badge.soon{background:#422006;color:#fdba74}
.badge.closed{background:#1c1917;color:var(--muted)}
.badge.appuntamento{background:#1a1212;color:#fbbf24}
.badge.urgente{background:#450a0a;color:#fca5a5}
.badge.prioritario{background:#431407;color:#fed7aa}
.badge.monitor{background:#172554;color:#93c5fd}
.badge.vedi{background:#2e1065;color:#d8b4fe}
.badge.opp{background:var(--bg3);color:var(--muted)}
.badge.geo{background:var(--bg3);color:var(--muted);font-style:italic}

/* MAP VIEW */
#map-view{display:none;height:calc(100vh - 130px)}
#map{width:100%;height:100%}
.leaflet-popup-content-wrapper{background:var(--bg2);border:1px solid var(--border);border-radius:10px;box-shadow:none}
.leaflet-popup-content{color:var(--text);font-family:-apple-system,sans-serif;font-size:13px;margin:8px 10px}
.leaflet-popup-tip{background:var(--bg2)}
.popup-nome{font-weight:700;font-size:14px;margin-bottom:4px}
.popup-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.popup-nav{display:block;background:var(--accent);color:white;padding:6px 12px;
  border-radius:8px;text-align:center;font-size:12px;font-weight:600;text-decoration:none;margin-top:4px}
.popup-detail{display:block;background:var(--bg3);color:var(--text);padding:5px 12px;
  border-radius:8px;text-align:center;font-size:12px;font-weight:600;margin-top:4px;cursor:pointer;border:none;width:100%}

/* DETAIL VIEW */
#detail{display:none;position:fixed;inset:0;background:var(--bg);overflow-y:auto;z-index:1000}
#detail.show{display:block}
#detail-header{background:var(--bg2);padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
#back-btn{background:var(--bg3);border:none;color:var(--text);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
#detail-title{font-size:17px;font-weight:700;flex:1}
#detail-body{padding:14px;display:flex;flex-direction:column;gap:14px}
.section{background:var(--bg2);border-radius:12px;padding:12px}
.section h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.orari-grid{display:grid;grid-template-columns:38px 1fr;gap:3px 8px;font-size:13px;align-items:baseline}
.giorno{color:var(--muted);font-weight:600}
.fascia{color:var(--text)}
.fascia.today{color:var(--green);font-weight:600}
.fascia.open-now{color:var(--green)}
.fascia.soon-text{color:#fdba74}
.fascia.none{color:var(--bg3)}
.opp-item{border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:6px}
.opp-item:last-child{margin-bottom:0}
.opp-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.opp-desc{font-size:13px;line-height:1.4;flex:1}
.opp-importo{font-size:12px;color:var(--accent2);font-weight:600;white-space:nowrap}
.opp-meta{font-size:11px;color:var(--muted);margin-top:3px}
.opp-visits{font-size:11px;color:var(--yellow);margin-top:2px}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:600;
  cursor:pointer;text-align:center;min-width:80px;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-nav{background:var(--accent);color:white}
.btn-call{background:var(--green);color:white}
.btn-mail{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn:active{opacity:.8}
#empty{text-align:center;padding:50px 20px;color:var(--muted);display:none}
</style>
</head>
<body>

<div id="header">
  <h1>LLPP <span>CRM</span></h1>
  <div id="gps-badge">📍 GPS…</div>
  <div class="view-toggle">
    <button class="view-btn active" onclick="setView('list')">≡ Lista</button>
    <button class="view-btn" onclick="setView('map')">🗺 Mappa</button>
  </div>
</div>

<div id="filters">
  <button class="filter-btn active" onclick="setFilter('tutti')">Tutti</button>
  <button class="filter-btn" onclick="setFilter('aperti')">🟢 Aperti</button>
  <button class="filter-btn" onclick="setFilter('presto')">🟡 Aprono presto</button>
  <button class="filter-btn" onclick="setFilter('urgente')">🔴 Urgente</button>
  <button class="filter-btn" onclick="setFilter('prioritario')">🟠 Prioritario</button>
  <button class="filter-btn" onclick="setFilter('monitor')">🔵 Da monitorare</button>
  <button class="filter-btn" onclick="setFilter('opp')">⭐ Con opp.</button>
</div>

<div id="search-wrap">
  <input id="search" type="search" placeholder="🔍 Cerca comune…" oninput="renderAll()">
</div>
<div id="stats"></div>
<div id="geocode-banner" style="display:none">
  ⏳ Recupero coordinate comuni (prima apertura)…
  <div id="geocode-progress"><div id="geocode-bar"></div></div>
</div>

<div id="list-view">
  <div id="list"><p style="text-align:center;padding:40px;color:var(--muted)">Caricamento…</p></div>
  <div id="empty"><div style="font-size:40px;margin-bottom:10px">🔍</div><p>Nessun comune trovato</p></div>
</div>

<div id="map-view">
  <div id="map"></div>
</div>

<!-- DETAIL -->
<div id="detail">
  <div id="detail-header">
    <button id="back-btn" onclick="closeDetail()">← Indietro</button>
    <div id="detail-title"></div>
  </div>
  <div id="detail-body"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
let COMUNI = [];
const API_BASE = (window.LLPP_API_BASE || 'http://127.0.0.1:5050');

async function loadComuni() {
  try {
    const r = await fetch(API_BASE + '/api/comuni');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    COMUNI = await r.json();
  } catch(e) {
    console.warn('API non raggiungibile, uso dati vuoti:', e);
    COMUNI = [];
  }
}

let userLat=null, userLon=null;
let activeFilter='tutti';
let currentView='list';
let leafletMap=null, markers=[];

// ── UTILS ─────────────────────────────────────────────────────────────────
function haversine(a,b,c,d){
  const R=6371,dL=(c-a)*Math.PI/180,dO=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function fmtDist(km){return km<1?Math.round(km*1000)+'m':km<10?km.toFixed(1)+'km':Math.round(km)+'km'}

function parseOrari(s){
  if(!s)return null;
  s=s.trim();
  if(/appuntamento/i.test(s))return 'appuntamento';
  const slots=[];
  const re=/(\d{1,2})[.:](\d{2})\s*[-–]\s*(\d{1,2})[.:](\d{2})/g;
  let m;
  while((m=re.exec(s))!==null)
    slots.push([parseInt(m[1])*60+parseInt(m[2]),parseInt(m[3])*60+parseInt(m[4])]);
  return slots.length?slots:null;
}

function todayKey(){
  const d=new Date().getDay();
  return ['dom','lun','mar','mer','gio','ven','sab'][d];
}

// Returns: 'open' | 'soon_Xmin' | 'closed' | 'appuntamento' | 'unknown'
function getStatus(orari){
  const now=new Date();
  const dow=now.getDay();
  if(dow===0||dow===6)return 'closed';
  const keys=['lun','mar','mer','gio','ven'];
  const key=keys[dow-1];
  const val=orari[key];
  if(!val)return 'closed';
  const parsed=parseOrari(val);
  if(!parsed)return 'closed';
  if(parsed==='appuntamento')return 'appuntamento';
  const nowMin=now.getHours()*60+now.getMinutes();
  // Open now?
  if(parsed.some(([s,e])=>nowMin>=s&&nowMin<=e))return 'open';
  // Opens within 120 min?
  const next=parsed.map(([s])=>s).filter(s=>s>nowMin).sort((a,b)=>a-b)[0];
  if(next!==undefined&&next-nowMin<=120)return `soon_${next-nowMin}`;
  return 'closed';
}

function statusBadgeHtml(st){
  if(st==='open')return '<span class="badge open">✓ Aperto</span>';
  if(st==='appuntamento')return '<span class="badge appuntamento">📅 Appuntamento</span>';
  if(st&&st.startsWith('soon_')){
    const m=parseInt(st.split('_')[1]);
    const txt=m<60?`Apre tra ${m} min`:`Apre tra ${Math.round(m/60)}h`;
    return `<span class="badge soon">🟡 ${txt}</span>`;
  }
  return '<span class="badge closed">Chiuso</span>';
}

function intClass(li){return li>=5?'urgente':li>=4?'prioritario':li>=3?'monitor':li>=2?'vedi':null}
function intBadgeHtml(li){
  const c=intClass(li);
  if(c==='urgente')return '<span class="badge urgente">🔴 URGENTE</span>';
  if(c==='prioritario')return '<span class="badge prioritario">🟠 Prioritario</span>';
  if(c==='monitor')return '<span class="badge monitor">🔵 Da monitorare</span>';
  if(c==='vedi')return '<span class="badge vedi">🟣 Vedi in 3 mesi</span>';
  return '';
}

// ── GPS ───────────────────────────────────────────────────────────────────
function initGPS(){
  const b=document.getElementById('gps-badge');
  if(!navigator.geolocation){b.textContent='📍 No GPS';b.className='err';renderAll();return}
  navigator.geolocation.watchPosition(pos=>{
    userLat=pos.coords.latitude;userLon=pos.coords.longitude;
    b.textContent='📍 GPS ✓';b.className='ok';
    renderAll();
    if(leafletMap&&userLat)leafletMap.setView([userLat,userLon],leafletMap.getZoom());
  },()=>{b.textContent='📍 No GPS';b.className='err';renderAll()},
  {enableHighAccuracy:true,timeout:15000,maximumAge:60000});
}

// ── GEOCODING — IndexedDB cache (sopravvive a iOS ITP) ────────────────────
const IDB_NAME='llpp_geo', IDB_STORE='coords';
function _idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(IDB_NAME,1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);
    r.onsuccess=e=>res(e.target.result);
    r.onerror=rej;
  });
}
async function idbGetAll(){
  try{
    const db=await _idbOpen();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,'readonly');
      const st=tx.objectStore(IDB_STORE);
      const vals=[],keys=[];
      st.openCursor().onsuccess=e=>{
        const cur=e.target.result;
        if(cur){keys.push(cur.key);vals.push(cur.value);cur.continue();}
        else{const o={};keys.forEach((k,i)=>o[k]=vals[i]);res(o);}
      };
      tx.onerror=rej;
    });
  }catch(e){return {};}
}
async function idbSet(id,coords){
  try{
    const db=await _idbOpen();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,'readwrite');
      tx.objectStore(IDB_STORE).put(coords,id);
      tx.oncomplete=res; tx.onerror=rej;
    });
  }catch(e){}
}

async function geocodeAll(){
  // Carica cache persistente da IndexedDB
  const cached=await idbGetAll();
  COMUNI.forEach(c=>{if(!c.lat&&cached[c.id]){c.lat=cached[c.id][0];c.lon=cached[c.id][1];}});
  // Filtra solo enti reali senza coordinate (esclude placeholder vuoti)
  const todo=COMUNI.filter(c=>!c.lat&&c.nome&&c.nome!=='Comune di');
  if(!todo.length)return;
  // Geocodifica in background, senza banner, 3 alla volta
  const BATCH=3;
  for(let i=0;i<todo.length;i+=BATCH){
    await Promise.all(todo.slice(i,i+BATCH).map(async c=>{
      try{
        const q=`${c.nome},${c.prov?c.prov+',Italy':'Friuli Venezia Giulia,Italy'}`;
        const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=it`,
          {headers:{'User-Agent':'LLPP-CRM/1.0'}});
        const d=await r.json();
        if(d.length){
          c.lat=parseFloat(d[0].lat);c.lon=parseFloat(d[0].lon);
          await idbSet(c.id,[c.lat,c.lon]);
        }
      }catch(e){}
    }));
    renderAll();
    if(currentView==='map')refreshMap();
    if(i+BATCH<todo.length)await new Promise(r=>setTimeout(r,400));
  }
  renderAll();
  if(currentView==='map')refreshMap();
}

// ── FILTERS & COMPUTED ────────────────────────────────────────────────────
function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>
    b.classList.toggle('active',b.getAttribute('onclick').includes("'"+f+"'")));
  renderAll();
}

function computeList(){
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  let list=COMUNI.map(c=>{
    const dist=(userLat&&c.lat)?haversine(userLat,userLon,c.lat,c.lon):null;
    const status=getStatus(c.orari);
    return{...c,dist,status};
  });
  if(activeFilter==='aperti')list=list.filter(c=>c.status==='open');
  else if(activeFilter==='presto')list=list.filter(c=>c.status&&c.status.startsWith('soon_'));
  else if(activeFilter==='urgente')list=list.filter(c=>c.max_interesse>=5);
  else if(activeFilter==='prioritario')list=list.filter(c=>c.max_interesse>=4);
  else if(activeFilter==='monitor')list=list.filter(c=>c.max_interesse>=3);
  else if(activeFilter==='opp')list=list.filter(c=>c.n_opp>0);
  if(q)list=list.filter(c=>c.nome.toLowerCase().includes(q)||c.prov.toLowerCase().includes(q));
  list.sort((a,b)=>{
    if(b.max_interesse!==a.max_interesse)return b.max_interesse-a.max_interesse;
    if(a.dist!==null&&b.dist!==null)return a.dist-b.dist;
    if(a.dist!==null)return -1;if(b.dist!==null)return 1;
    return a.nome.localeCompare(b.nome);
  });
  return list;
}

// ── VIEW TOGGLE ───────────────────────────────────────────────────────────
function setView(v){
  currentView=v;
  document.querySelectorAll('.view-btn').forEach(b=>
    b.classList.toggle('active',b.getAttribute('onclick').includes("'"+v+"'")));
  document.getElementById('list-view').style.display=v==='list'?'block':'none';
  document.getElementById('map-view').style.display=v==='map'?'block':'none';
  if(v==='map')initMap();
}

// ── LIST RENDER ───────────────────────────────────────────────────────────
function renderAll(){
  const list=computeList();
  document.getElementById('stats').textContent=
    `${list.length} comuni · ${list.filter(c=>c.status==='open').length} aperti · `+
    `${list.filter(c=>c.status&&c.status.startsWith('soon_')).length} aprono presto`+
    (userLat?'':' · attiva GPS per distanze');
  const container=document.getElementById('list');
  document.getElementById('empty').style.display=list.length?'none':'block';
  if(!list.length){container.innerHTML='';return}
  container.innerHTML=list.map(c=>{
    const cls='card'+(c.status==='open'?' open-now':'')+(c.max_interesse>=5?' urgente':c.max_interesse>=4?' prioritario':c.n_opp>0?' has-opp':'');
    const dist=c.dist!==null?`<span class="card-dist">${fmtDist(c.dist)}</span>`:'';
    return`<div class="${cls}" onclick="openDetail(${c.id})">
      <div class="card-top">
        <div class="card-nome">${c.nome}</div>
        <span class="card-prov">${c.prov||''}</span>${dist}
      </div>
      <div class="card-badges">
        ${statusBadgeHtml(c.status)}
        ${intBadgeHtml(c.max_interesse)}
        ${c.n_opp>0?`<span class="badge opp">⭐ ${c.n_opp}</span>`:''}
        ${!c.lat?'<span class="badge geo">📍…</span>':''}
      </div>
    </div>`;
  }).join('');
}

// ── MAP ───────────────────────────────────────────────────────────────────
function markerColor(c){
  if(c.max_interesse>=5)return'#ef4444';
  if(c.max_interesse>=4)return'#f97316';
  if(c.max_interesse>=3)return'#3b82f6';
  if(c.status==='open')return'#22c55e';
  return'#64748b';
}
function makeIcon(color){
  return L.divIcon({className:'',html:
    `<svg width="22" height="30" viewBox="0 0 22 30" xmlns="http://www.w3.org/2000/svg">
      <path d="M11 0C4.9 0 0 4.9 0 11c0 7.7 11 19 11 19s11-11.3 11-19C22 4.9 17.1 0 11 0z" fill="${color}"/>
      <circle cx="11" cy="11" r="5" fill="white" opacity=".9"/>
    </svg>`,iconSize:[22,30],iconAnchor:[11,30],popupAnchor:[0,-32]});
}

function initMap(){
  if(leafletMap)return refreshMap();
  const center=userLat?[userLat,userLon]:[46.0,12.8];
  leafletMap=L.map('map').setView(center,10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO',maxZoom:18
  }).addTo(leafletMap);
  // User marker
  if(userLat){
    L.circleMarker([userLat,userLon],{radius:8,color:'white',fillColor:'#60a5fa',fillOpacity:1,weight:2})
      .bindPopup('<b>📍 Sei qui</b>').addTo(leafletMap);
  }
  refreshMap();
}

function refreshMap(){
  if(!leafletMap)return;
  markers.forEach(m=>m.remove());
  markers=[];
  const list=computeList();
  list.filter(c=>c.lat).forEach(c=>{
    const dist=c.dist!==null?`<br><small>${fmtDist(c.dist)}</small>`:'';
    const navUrl=`https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lon}&travelmode=driving`;
    const popup=`<div class="popup-nome">${c.nome} <small style="color:#94a3b8">${c.prov||''}</small>${dist}</div>
      <div class="popup-badges">${statusBadgeHtml(c.status)}${intBadgeHtml(c.max_interesse)}</div>
      <a class="popup-nav" href="${navUrl}" target="_blank">🗺️ Naviga</a>
      <button class="popup-detail" onclick="openDetail(${c.id})">Dettaglio →</button>`;
    const m=L.marker([c.lat,c.lon],{icon:makeIcon(markerColor(c))})
      .bindPopup(popup,{maxWidth:200}).addTo(leafletMap);
    markers.push(m);
  });
}

// ── DETAIL ────────────────────────────────────────────────────────────────
function openDetail(id){
  const c=COMUNI.find(x=>x.id===id);if(!c)return;
  document.getElementById('detail-title').textContent=c.nome;
  const now=new Date();
  const dk=todayKey();
  const giorni=[['Lun','lun'],['Mar','mar'],['Mer','mer'],['Gio','gio'],['Ven','ven']];
  const orHtml=giorni.map(([lbl,key])=>{
    const isToday=key===dk;
    const val=c.orari[key];
    const parsed=val?parseOrari(val):null;
    let fasce='';
    if(!val)fasce='<span class="fascia none">—</span>';
    else if(parsed==='appuntamento')fasce='<span class="fascia">📅 Su appuntamento</span>';
    else if(parsed){
      const nowMin=now.getHours()*60+now.getMinutes();
      fasce=parsed.map(([s,e])=>{
        const isOpen=isToday&&nowMin>=s&&nowMin<=e;
        const isSoon=isToday&&s>nowMin&&s-nowMin<=120;
        const t=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}–${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
        const cls=isOpen?'open-now':isSoon?'soon-text':isToday?'today':'';
        return`<span class="fascia ${cls}">${t}${isSoon?` (tra ${s-nowMin}min)`:''}</span>`;
      }).join(' ');
    }else fasce=`<span class="fascia">${val}</span>`;
    return`<span class="giorno${isToday?' today':''}">${lbl}</span>${fasce}`;
  }).join('');
  const oppList=(c.opportunita||[]).filter(o=>o.interesse&&!o.interesse.includes('CHIUSO'));
  const oppHtml=oppList.length?`<div class="section"><h3>Opportunità (${oppList.length})</h3>${oppList.map(o=>{
    const bc={URGENTE:'urgente',PRIORITARIO:'prioritario','DA MONITORARE':'monitor','VEDI IN 3 MESI':'vedi'}[o.interesse]||'';
    const imp=o.importo?` · €${(o.importo/1000).toFixed(0)}k`:'';
    return`<div class="opp-item">
      <div class="opp-top">
        <div>${bc?`<span class="badge ${bc}" style="font-size:10px;margin-bottom:3px;display:inline-block">${o.interesse}</span><br>`:''}
          <span class="opp-desc">${o.desc||o.tipologia||'—'}</span></div>
        ${imp?`<span class="opp-importo">${imp}</span>`:''}
      </div>
      ${o.stato?`<div class="opp-meta">📋 ${o.stato}</div>`:''}
      ${[o.ultima_visita&&'Ultima: '+o.ultima_visita,o.prossima_visita&&'Prossima: '+o.prossima_visita].filter(Boolean).map(x=>`<div class="opp-visits">📅 ${x}</div>`).join('')}
    </div>`;}).join('')}</div>`:'';
  const navUrl=c.lat?
    `https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lon}&travelmode=driving`:
    `https://www.google.com/maps/search/${encodeURIComponent(c.nome_raw+', Italia')}`;
  document.getElementById('detail-body').innerHTML=`
    <div class="actions">
      <button class="btn btn-nav" onclick="window.open('${navUrl}','_blank')">🗺️ Naviga</button>
      ${c.tel?`<button class="btn btn-call" onclick="location='tel:${c.tel}'">📞 Chiama</button>`:''}
      ${c.email?`<button class="btn btn-mail" onclick="location='mailto:${c.email}'">✉️ Email</button>`:''}
    </div>
    <div class="section"><h3>Orari</h3><div class="orari-grid">${orHtml}</div></div>
    ${oppHtml}
    ${c.note?`<div class="section"><h3>Note</h3><p style="font-size:13px">${c.note}</p></div>`:''}
    ${c.pec?`<div class="section"><h3>PEC</h3><p style="font-size:12px;color:var(--muted)">${c.pec}</p></div>`:''}`;
  document.getElementById('detail').classList.add('show');
}
function closeDetail(){document.getElementById('detail').classList.remove('show')}
window.addEventListener('popstate',closeDetail);

  await loadComuni();
  renderAll();initGPS();await geocodeAll();
